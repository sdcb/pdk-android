name: Build

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/build.yml"
      - "app/**"
      - "core/**"
      - "gradle/**"
      - "build.gradle.kts"
      - "settings.gradle.kts"
      - "gradle.properties"
      - "gradlew"
      - "gradlew.bat"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Android release APK (${{ matrix.name }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: x64
            runner: ubuntu-24.04
            apk: pdk-android-x64.apk
          - name: arm64
            runner: ubuntu-24.04
            apk: pdk-android-arm64.apk

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Build release APK
        run: gradle --no-daemon :app:assembleRelease

      - name: Rename release APK
        run: cp app/build/outputs/apk/release/app-release.apk "${{ matrix.apk }}"

      - name: Upload release APK
        uses: actions/upload-artifact@v7
        with:
          path: ${{ matrix.apk }}
          if-no-files-found: error
          archive: false
