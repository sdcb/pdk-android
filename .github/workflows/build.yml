name: Build

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/build.yml"
      - "app/**"
      - "core/**"
      - "gradle/**"
      - "build.gradle.kts"
      - "settings.gradle.kts"
      - "gradle.properties"
      - "gradlew"
      - "gradlew.bat"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Android release APK
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Build release APK
        run: gradle --no-daemon :app:assembleRelease

      - name: Rename release APK
        run: cp app/build/outputs/apk/release/app-release.apk pdk-android.apk

      - name: Upload release APK
        uses: actions/upload-artifact@v7
        with:
          path: pdk-android.apk
          if-no-files-found: error
          archive: false

      - name: Upload APK to MinIO
        run: |
          aws s3 cp pdk-android.apk "s3://${{ vars.MINIO_BUCKET }}/2026/pdk-android.apk" \
            --endpoint-url "${{ secrets.MINIO_HOST }}" \
            --no-progress
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.MINIO_ACCESS_KEY }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.MINIO_SECRET_KEY }}
          AWS_DEFAULT_REGION: us-east-1
          AWS_EC2_METADATA_DISABLED: "true"
